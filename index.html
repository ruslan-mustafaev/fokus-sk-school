<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo/image.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FOCUS School - Онлайн школа словацької мови</title>
    <link rel="preload" as="image" href="/IMG_2092.webp" fetchpriority="high" />
    <meta
      name="description"
      content="FOCUS School - навчайся словацької мови онлайн з професійними викладачами. Фокус. Дія. Результат."
    />
    <script>
      // Disable browser scroll restoration IMMEDIATELY
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      window.scrollTo(0, 0);
      // Track when loader started — to enforce minimum display time
      window.__loaderStartTime = Date.now();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #2D2D2D;
      }
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #2D2D2D;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader img {
        width: 160px;
        height: auto;
        filter: brightness(0) invert(1);
      }
      @keyframes loader-pulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      #app-loader .loader-logo {
        animation: loader-pulse 1.5s ease-in-out infinite;
      }
      #app-loader .loader-dots {
        display: flex;
        gap: 8px;
        margin-top: 32px;
      }
      #app-loader .loader-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #EE4E00;
        animation: loader-pulse 1.2s ease-in-out infinite;
      }
      #app-loader .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      #app-loader .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <img src="/logo/image.png" alt="FOCUS" class="loader-logo" />
      <div class="loader-dots">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Helper to hide loader with minimum display time of 1 second
      window.__hideLoader = function() {
        var elapsed = Date.now() - (window.__loaderStartTime || Date.now());
        var minTime = 1000; // minimum 1 second
        var remaining = Math.max(0, minTime - elapsed);
        setTimeout(function() {
          var loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(function() { loader.remove(); }, 500);
          }
        }, remaining);
      };

      // Safety: hide loader after 5 seconds max
      setTimeout(function() {
        if (window.__hideLoader) window.__hideLoader();
      }, 5000);
    </script>
  </body>
</html>
